name = "x402-explorer-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
account_id = "174035f0b17da0144acfa9e8b371d46f"  # Kojin

[[d1_databases]]
binding = "DB"
database_name = "x402_explorer_prod"
database_id = "c6d1ee3c-75a3-4354-b745-30609fbd816e"
migrations_dir = "migrations"

[vars]
HELIUS_NETWORK = "devnet"
ALLOWED_ORIGIN = "https://x402explorer.fracturelab.dev"

# Secrets（wrangler secret put で個別投入、ここには書かない）:
#   HELIUS_API_KEY
#   HELIUS_WEBHOOK_SECRET

[[routes]]
pattern = "x402explorer-api.fracturelab.dev"
custom_domain = true
