name = "x402-explorer-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
# account_id = "<KOJIN_ACCOUNT_ID>"  # ← wrangler whoami で取得後に追記

[[d1_databases]]
binding = "DB"
database_name = "x402_explorer_prod"
database_id = "local-dev-placeholder"  # ← wrangler d1 create 後に実際の ID に差し替え
migrations_dir = "migrations"

[vars]
HELIUS_NETWORK = "devnet"
ALLOWED_ORIGIN = "https://x402explorer.fracturelab.dev"

# Secrets（wrangler secret put で個別投入、ここには書かない）:
#   HELIUS_API_KEY
#   HELIUS_WEBHOOK_SECRET

[[routes]]
pattern = "api.x402explorer.fracturelab.dev"
custom_domain = true
