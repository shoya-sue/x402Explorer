name = "x402-explorer-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "x402_explorer"
database_id = "local-dev-placeholder"
migrations_dir = "migrations"

[vars]
HELIUS_NETWORK = "devnet"

# HELIUS_API_KEY はローカルでは .dev.vars から読む
# 本番デプロイ時は: wrangler secret put HELIUS_API_KEY
